        to { opacity: 1; }
      }
      .animate-slide-up {
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .animate-fade-in {
        animation: fadeIn 0.8s ease-out forwards;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
